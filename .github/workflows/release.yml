name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: version
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
          else
            # Increment patch version
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "tag=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Next version: $NEXT"

      - name: Check if release needed
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.skip == 'false'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Set up Go
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        if: steps.check.outputs.skip == 'false'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update krew manifest
        if: steps.check.outputs.skip == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          SHA_AMD64=$(shasum -a 256 dist/kubectl-lofi-${TAG}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_ARM64=$(shasum -a 256 dist/kubectl-lofi-${TAG}-darwin-arm64.tar.gz | cut -d' ' -f1)

          cat > lofi.yaml <<MANIFEST
          apiVersion: krew.googlecontainertools.github.com/v1alpha2
          kind: Plugin
          metadata:
            name: lofi
          spec:
            version: ${TAG}
            shortDescription: Play lo-fi beats in your terminal while you kubectl
            homepage: https://github.com/zamai/kubectl-lofi
            caveats: |
              This plugin is macOS-only. It requires audio output support
              and uses the Oto audio library for playback.
            platforms:
            - selector:
                matchLabels:
                  os: darwin
                  arch: amd64
              uri: https://github.com/zamai/kubectl-lofi/releases/download/${TAG}/kubectl-lofi-${TAG}-darwin-amd64.tar.gz
              sha256: ${SHA_AMD64}
              bin: kubectl-lofi
            - selector:
                matchLabels:
                  os: darwin
                  arch: arm64
              uri: https://github.com/zamai/kubectl-lofi/releases/download/${TAG}/kubectl-lofi-${TAG}-darwin-arm64.tar.gz
              sha256: ${SHA_ARM64}
              bin: kubectl-lofi
          MANIFEST

          sed -i '' 's/^          //' lofi.yaml || sed -i 's/^          //' lofi.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lofi.yaml
          git commit -m "Update krew manifest for ${TAG}" || true
          git push origin main
