name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update krew manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHA_AMD64=$(shasum -a 256 dist/kubectl-lofi-${TAG}-darwin-amd64.tar.gz | cut -d' ' -f1)
          SHA_ARM64=$(shasum -a 256 dist/kubectl-lofi-${TAG}-darwin-arm64.tar.gz | cut -d' ' -f1)

          cat > lofi.yaml <<EOF
          apiVersion: krew.googlecontainertools.github.com/v1alpha2
          kind: Plugin
          metadata:
            name: lofi
          spec:
            version: ${TAG}
            shortDescription: Play lo-fi beats in your terminal while you kubectl
            homepage: https://github.com/zamai/kubectl-lofi
            caveats: |
              This plugin is macOS-only. It requires audio output support
              and uses the Oto audio library for playback.
            platforms:
            - selector:
                matchLabels:
                  os: darwin
                  arch: amd64
              uri: https://github.com/zamai/kubectl-lofi/releases/download/${TAG}/kubectl-lofi-${TAG}-darwin-amd64.tar.gz
              sha256: ${SHA_AMD64}
              bin: kubectl-lofi
            - selector:
                matchLabels:
                  os: darwin
                  arch: arm64
              uri: https://github.com/zamai/kubectl-lofi/releases/download/${TAG}/kubectl-lofi-${TAG}-darwin-arm64.tar.gz
              sha256: ${SHA_ARM64}
              bin: kubectl-lofi
          EOF

          # Remove leading whitespace from heredoc
          sed -i '' 's/^          //' lofi.yaml || sed -i 's/^          //' lofi.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add lofi.yaml
          git commit -m "Update krew manifest for ${TAG}"
          git push origin main
