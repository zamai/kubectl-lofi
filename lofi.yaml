apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: lofi
spec:
  version: v0.1.0
  shortDescription: Play lo-fi beats in your terminal while you kubectl
  homepage: https://github.com/zamai/kubectl-lofi
  caveats: |
    This plugin is macOS-only. It requires audio output support
    and uses the Oto audio library for playback.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zamai/kubectl-lofi/releases/download/v0.1.0/kubectl-lofi-v0.1.0-darwin-amd64.tar.gz
    sha256: 807cd3f9ad8cc82ee29931cc41069d1c2add06adb5b36c80a0582c3910606df7
    bin: kubectl-lofi
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zamai/kubectl-lofi/releases/download/v0.1.0/kubectl-lofi-v0.1.0-darwin-arm64.tar.gz
    sha256: 3db67dae1cb47fb006c712691c5de69e28a496195f31710e46c5702736384e46
    bin: kubectl-lofi
