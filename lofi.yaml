apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: lofi
spec:
  version: v0.1.1
  shortDescription: Play lo-fi beats in your terminal while you kubectl
  homepage: https://github.com/zamai/kubectl-lofi
  caveats: |
    This plugin is macOS-only. It requires audio output support
    and uses the Oto audio library for playback.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zamai/kubectl-lofi/releases/download/v0.1.1/kubectl-lofi-v0.1.1-darwin-amd64.tar.gz
    sha256: 86571fd6e698deb05ba08c0732adab6c3d560d01da4d219b079351021e2c96af
    bin: kubectl-lofi
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zamai/kubectl-lofi/releases/download/v0.1.1/kubectl-lofi-v0.1.1-darwin-arm64.tar.gz
    sha256: d3df61f42ddc6f7aaeda9f2407fdb8b588c083b03426c492507ec0f3927e5314
    bin: kubectl-lofi
